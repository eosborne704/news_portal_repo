{% block title %}Now News{% endblock %}
{% block content %}
<div class="login-block">
  <h2 class="now-news-title">All Articles</h2>
  <ul>
      {% for article in articles %}
          <li><a href="{% url 'article_detail' pk=article.pk %}">{{ article.title }}</a></li>
      {% endfor %}
  </ul>
  <a href="{% url 'article_create' %}">Write Article</a>
  <a href="{% url 'newsletter_list' %}">View Newsletters</a>
  <a href="/">Back to Menu</a>
</div>
{% endblock %}
