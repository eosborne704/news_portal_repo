version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: news_portal
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newspassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://newsuser:newspassword@db:5432/news_portal
volumes:
  postgres_data:
